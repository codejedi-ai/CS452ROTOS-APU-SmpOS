# docker-compose.yml — smpos-nix kernel containers with CPU caps.
#
# The kernel runs single-CPU (QEMU raspi4b exposes 4 cores but cores 1-3 are
# parked in WFI), so each container is capped at ONE host core. Override per
# invocation with DEV_CPUS, e.g. `DEV_CPUS=4 docker compose run --rm build`
# for a faster parallel compile.
#
# Dev image = toolchain + QEMU; the source tree is bind-mounted at /src, so
# editing kernel code never rebuilds the image — just re-run a service.
#
#   docker compose build                 # build the dev image once (downloads toolchain)
#   docker compose run --rm build        # make
#   docker compose run --rm test         # make + boot on QEMU raspi4b (timed)
#   docker compose run --rm -it run      # interactive QEMU OS terminal (./dev.sh run)
#   docker compose run --rm shell        # bash inside the container

name: smpos-nix

# Shared dev-container definition (anchor reused by each command service).
x-dev: &dev
  image: ${DARCYOS_IMAGE:-codejedi-ai/cs452rotos-platform:latest}
  pull_policy: missing
  cpus: "${DEV_CPUS:-1}"      # <-- container CPU cap (one host core by default)
  working_dir: /src
  volumes:
    - .:/src
    - nix-disk:/disk           # persistent OS filesystem mount
  environment:
    - DISK_ROOT=/disk
    - XDIR=/opt/toolchain
    - PATH=/opt/toolchain/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  init: true

services:
  # Interactive bash in the container.
  shell:
    <<: *dev
    stdin_open: true
    tty: true
    command: ["bash"]

  # Build the kernel (make).
  build:
    <<: *dev
    command: ["make"]

  # Build + boot on QEMU raspi4b with a timeout (CI-friendly).
  test:
    <<: *dev
    command: ["bash", "-c", "make && bash docker-test.sh"]

  # Build + boot interactively — this is the OS serial terminal.
  # QEMU runs in the foreground with -serial stdio, so the host TTY drives
  # the OS console directly (Ctrl-A X to quit).
  #   ./dev.sh run
  run:
    <<: *dev
    stdin_open: true
    tty: true
    command: ["bash", "docker-run.sh"]

volumes:
  nix-disk:          # survives container restarts; wiped only by `docker volume rm`
